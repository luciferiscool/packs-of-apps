<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – LinkDock</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #080810;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.15;
    }
    .orb1 { width: 500px; height: 500px; background: #7c3aed; top: -150px; left: -150px; }
    .orb2 { width: 400px; height: 400px; background: #2563eb; bottom: -100px; right: -100px; }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(12px);
    }

    .logo {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
    }
    .logo span { color: #a78bfa; }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #555;
      margin-bottom: 32px;
    }

    /* tabs */
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 9px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      transition: background 0.2s, color 0.2s;
      border: none;
      background: transparent;
    }
    .tab.active {
      background: #7c3aed;
      color: #fff;
    }

    .form { display: none; flex-direction: column; gap: 14px; }
    .form.active { display: flex; }

    label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      margin-bottom: 5px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: #444; }
    input:focus { border-color: #7c3aed; }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 13px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #333;
      font-size: 12px;
      margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    .google-btn {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #ccc;
      font-size: 13px;
      font-weight: 600;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .google-btn:hover { background: rgba(255,255,255,0.1); }

    .msg {
      text-align: center;
      font-size: 13px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }
    .msg.error { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
    .msg.success { background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
    .msg.show { display: block; }

    .forgot {
      text-align: right;
      font-size: 12px;
      color: #a78bfa;
      cursor: pointer;
      margin-top: -6px;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
    }
    .forgot:hover { color: #fff; }

    .back-home {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #444;
    }
    .back-home a { color: #7c3aed; text-decoration: none; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<div class="card">
  <div class="logo">Link<span>Dock</span></div>
  <div class="subtitle">Access your purchased resources</div>

  <!-- tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- message -->
  <div class="msg" id="msg"></div>

  <!-- LOGIN FORM -->
  <div class="form active" id="loginForm">
    <div>
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@email.com" />
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" />
    </div>
    <button class="forgot" onclick="forgotPassword()">Forgot password?</button>
    <button class="btn" id="loginBtn" onclick="loginUser()">Login</button>
    <div class="divider">or</div>
    <button class="google-btn" onclick="googleLogin()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- SIGNUP FORM -->
  <div class="form" id="signupForm">
    <div>
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Your name" />
    </div>
    <div>
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="you@email.com" />
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="signupPass" placeholder="Min 6 characters" />
    </div>
    <button class="btn" id="signupBtn" onclick="signupUser()">Create Account</button>
    <div class="divider">or</div>
    <button class="google-btn" onclick="googleLogin()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <div class="back-home"><a href="welcome.html">← Back to home</a></div>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
    document.getElementById('loginForm').classList.toggle('active', tab==='login');
    document.getElementById('signupForm').classList.toggle('active', tab==='signup');
    showMsg('','');
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg' + (text ? ' show ' + type : '');
  }

  function setLoading(btnId, loading, label) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span>Please wait...' : label;
  }

  // Login
  async function loginUser() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    if (!email || !pass) return showMsg('Please fill in all fields.', 'error');
    setLoading('loginBtn', true, 'Login');
    try {
      await auth.signInWithEmailAndPassword(email, pass);
      showMsg('Login successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } catch(e) {
      showMsg(friendlyError(e.code), 'error');
      setLoading('loginBtn', false, 'Login');
    }
  }

  // Signup
  async function signupUser() {
    const name  = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const pass  = document.getElementById('signupPass').value;
    if (!name || !email || !pass) return showMsg('Please fill in all fields.', 'error');
    if (pass.length < 6) return showMsg('Password must be at least 6 characters.', 'error');
    setLoading('signupBtn', true, 'Create Account');
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({ displayName: name });
      await db.collection('users').doc(cred.user.uid).set({
        name, email, createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showMsg('Account created! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } catch(e) {
      showMsg(friendlyError(e.code), 'error');
      setLoading('signupBtn', false, 'Create Account');
    }
  }

  // Google login
  async function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      const cred = await auth.signInWithPopup(provider);
      const user = cred.user;
      const doc = await db.collection('users').doc(user.uid).get();
      if (!doc.exists) {
        await db.collection('users').doc(user.uid).set({
          name: user.displayName,
          email: user.email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      window.location.href = 'dashboard.html';
    } catch(e) {
      showMsg(friendlyError(e.code), 'error');
    }
  }

  // Forgot password
  async function forgotPassword() {
    const email = document.getElementById('loginEmail').value.trim();
    if (!email) return showMsg('Enter your email above first.', 'error');
    try {
      await auth.sendPasswordResetEmail(email);
      showMsg('Password reset email sent! Check your inbox.', 'success');
    } catch(e) {
      showMsg(friendlyError(e.code), 'error');
    }
  }

  function friendlyError(code) {
    const map = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password. Try again.',
      'auth/email-already-in-use': 'This email is already registered.',
      'auth/invalid-email': 'Please enter a valid email address.',
      'auth/weak-password': 'Password is too weak.',
      'auth/popup-closed-by-user': 'Google login cancelled.',
      'auth/too-many-requests': 'Too many attempts. Please wait a moment.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }

  // Auto redirect if already logged in
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
